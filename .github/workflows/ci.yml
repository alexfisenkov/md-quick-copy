name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .

      - name: Run tests
        run: xcodebuild test -project MDQuickCopy.xcodeproj -scheme MDQuickCopyCoreTests -destination 'platform=macOS'

      - name: Build release app
        run: ./script/build_and_run.sh --build-only
