name: MDQuickCopy
options:
  bundleIdPrefix: com.alexfisenkov
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  MDQuickCopy:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - target: MDQuickCopyPreviewExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_NAME: "MD Quick Copy"
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfisenkov.MDQuickCopy
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: App/MDQuickCopy.entitlements

  MDQuickCopyCore:
    type: framework
    platform: macOS
    sources:
      - path: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfisenkov.MDQuickCopyCore
        GENERATE_INFOPLIST_FILE: YES
        APPLICATION_EXTENSION_API_ONLY: YES

  MDQuickCopyPreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: PreviewExtension
    dependencies:
      - target: MDQuickCopyCore
        embed: true
        codeSign: true
      - sdk: QuickLookUI.framework
    settings:
      base:
        PRODUCT_NAME: "MD Quick Copy Preview Extension"
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfisenkov.MDQuickCopy.PreviewExtension
        INFOPLIST_FILE: PreviewExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: PreviewExtension/PreviewExtension.entitlements

  MDQuickCopyCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MDQuickCopyCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfisenkov.MDQuickCopyCoreTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MDQuickCopy:
    build:
      targets:
        MDQuickCopy: all
        MDQuickCopyPreviewExtension: all
        MDQuickCopyCore: all
    run:
      config: Debug
    test:
      targets:
        - MDQuickCopyCoreTests
  MDQuickCopyCoreTests:
    build:
      targets:
        MDQuickCopyCoreTests: all
    test:
      targets:
        - MDQuickCopyCoreTests
